services:
  - type: web
    name: public-http-server
    runtime: node
    rootDir: public-http-server
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: SERVICE_NAME
        value: public-http-server
      - key: API_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: public-http-server-db
          property: connectionString

databases:
  - name: public-http-server-db
    plan: free
    databaseName: public_http_server
    user: public_http_server
